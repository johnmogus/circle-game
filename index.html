<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Bullet Hell</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #fff; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="600" height="800"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // Game State
        let score = 0;
        let gameOver = false;

        // Player object (Tiny hitbox for bullet hell precision)
        const player = {
            x: 300, y: 700,
            speed: 5,
            size: 15,
            hitboxRadius: 4
        };

        const boss1 = {
            type: "boss1",
            x: 300, y: 200,
            speed: 5,
            size: 30,
            hitboxRadius: 40,
            health: 100
        }

        const sideSniper = {
            type: "aimAtPlayer",
            speed: 5,
            size: 20,
            hitboxRadius: 40,
            health: 20
        }


        const enemies = [boss1];

        // Input tracking
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Bullets array
        const bullets = [];
        let tick = 0;
        let cooldown = 0;

        function RandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Spawn a ring of bullets
        function spawnBulletRing(cx, cy, count, speed) {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                bullets.push({
                    alive: true,
                    shooter: "enemy",
                    x: cx,
                    y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 5
                });
            }
        }

        function spawnBulletTowardsPlayer(cx, cy, playerX, playerY, speed) {
        const angle = Math.atan2(playerX - cx, playerY - cy);
        bullets.push({
            alive: true,
            shooter: "enemy",
            x: cx, y: cy,
            vx: Math.cos(angle - Math.PI/2) * speed,
            vy: Math.sin(angle + Math.PI/2) * speed,
            radius: 6
        });
        }
        

        // Main Game Loop
        function update() {
            if (gameOver) return;

            tick++;
            scoreEl.innerText = score;
            if (cooldown > 0) cooldown--;

            // --- Add Enemies ---
            if (tick % 50 === 0) {
                if (Math.random() > 0.5) {
                    var leftSniper = sideSniper;
                    leftSniper.x = 50;
                    leftSniper.y = -10;
                    enemies.push(leftSniper);
                }
                else {
                    var rightSniper = sideSniper;
                    rightSniper.x = 550;
                    rightSniper.y = -10;
                    enemies.push(rightSniper);
                }

            }


            // --- Movement ---
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

            // Clamp player to screen
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            //Player bullets
            if (keys['z'] && cooldown == 0) {
                bullets.push({
                    alive: true,
                    shooter: "player",
                    x: player.x,
                    y: player.y,
                    vx: 0,
                    vy: -10,
                    radius: 5
                });
                cooldown = 10
            }

            //Enemy Movement
            for (let i = enemies.length - 1; i >= 0; i--) {
                var e = enemies[i]
                if (e.type == "aimAtPlayer") {
                    e.y += e.speed
                }
            }


            // --- Enemy Bullet Patterns ---
            for (let i = enemies.length - 1; i >= 0; i--) {
                var e = enemies[i];
                if (e.type == "boss1") {
                    // Pattern A: Spiral from center
                    if (tick % 4 === 0) {
                        const angle = (tick * 0.05) % (Math.PI * 2);
                        bullets.push({
                            alive: true,
                            shooter: "enemy",
                            x: e.x, y: e.y,
                            vx: Math.cos(angle) * 3,
                            vy: Math.sin(angle) * 3,
                            radius: 6
                        });
                    }
                    // Pattern B: Burst rings
                    if (tick % 60 === 0) {
                        spawnBulletRing(e.x, e.y, 16, 2);
                    }
                    if (tick % 20 === 0) {
                        spawnBulletTowardsPlayer(e.x, e.y, player.x, player.y, 5)
                    }
                }
                if (e.type == "aimAtPlayer") {
                    // Towards Player Bullets
                    if (tick % 20 === 0) {
                        spawnBulletTowardsPlayer(e.x, e.y, player.x, player.y, 5)
                    }
                }
            }

            // --- Update & Check Bullets ---
            for (let bulletIndex = bullets.length - 1; bulletIndex >= 0; bulletIndex--) {
                var b = bullets[bulletIndex];
                b.x += b.vx;
                b.y += b.vy;

                if (b.shooter == "enemy") {
                    const dist = Math.hypot(b.x - player.x, b.y - player.y);
                    if (dist < b.radius + player.hitboxRadius) {
                        gameOver = true;
                        alert(`Game Over! Final Score: ${score}`);
                        window.location.reload();
                        break;
                    }
                }

                if (b.shooter == "player") {
                    for (let enemyIndex = enemies.length - 1; enemyIndex >= 0; enemyIndex--) {
                        var e = enemies[enemyIndex];
                        const dist = Math.hypot(b.x - e.x, b.y - e.y);
                        if (dist < b.radius + e.hitboxRadius) {
                            b.alive = false;
                            e.health -= 10;
                            score += 10;
                        }
                    }
                }

                // Remove dead and off screen bullets
                if (b.x < -10 || b.x > canvas.width + 10 || b.y < -10 || b.y > canvas.height + 10 || !b.alive) {
                    bullets.splice(bulletIndex, 1);
                }
            }

            //remove dead and off screen enemies
            for (let enemyIndex = enemies.length - 1; enemyIndex >= 0; enemyIndex--) {
                var e = enemies[enemyIndex];
                if (e.health == 0 || e.x < -10 || e.x > canvas.width + 10 || e.y > canvas.height + 10) {
                    enemies.splice(enemyIndex, 1);
                }
            }

            // --- Render Everything ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            

            // Draw Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                var e = enemies[i];
                if (e.type == "boss1") {
                    if (e.health > 0) {
                        ctx.font = "25px Arial";
                        ctx.fillText("Health: " + e.health, 10, 25);
                        //ctx.fillRect(0, 20, e.health, 20)
                    }
                    ctx.fillStyle = 'purple';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                else if (e.type == "aimAtPlayer") {
                    ctx.fillStyle = 'purple';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw Player Ship
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw critical Hitbox core
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.hitboxRadius, 0, Math.PI * 2);
            ctx.fill();

            // Draw Bullets
            ctx.fillStyle = '#ff3336';
            for (const b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(update);
        }

        // Start the game
        requestAnimationFrame(update);
    </script>
</body>
</html>
