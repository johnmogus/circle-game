<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Bullet Hell</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #fff; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="600" height="800"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const TICK_RATE = 60;
        const MS_PER_TICK = 1000 / TICK_RATE;
        let lastTick = performance.now();
        let accumulator = 0;


        // Game State
        let score = 0;
        let gameOver = false;

        const player = {
            x: 300, y: 700,
            speed: 200,
            size: 15,
            hitboxRadius: 4,
            shotCooldown: 0
        };

        const attackPatterns = {
            spiral: {
                cooldown: 0.2,
                callback: spawnBulletsAtAngle
            },
            burstRing: {
                cooldown: 0.8,
                callback: spawnBulletRing
            },
            towardsPlayer: {
                cooldown: 0.6
            }
        }

        const boss1 = {
            type: "boss1",
            x: 300, y: 200,
            speed: 5,
            size: 30,
            hitboxRadius: 40,
            health: 100,
            patterns: [
                attackPatterns.spiral,
                attackPatterns.burstRing
            ]
        }

        // const sideSniper = {
        //     type: "sideSniper",
        //     speed: 5,
        //     size: 20,
        //     hitboxRadius: 40,
        //     health: 20
        // }


        const enemies = [];
        enemies.push(boss1);

        const bullets = [];

        // Input tracking
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function spawnBulletsAtAngle(cx, cy, angle, speed, radius, shooter) {
            bullets.push({
                alive: true,
                shooter: shooter,
                x: cx, y: cy,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 6
            });
        }

        // Spawn a ring of bullets
        function spawnBulletRing(cx, cy, count, speed, radius) {
            for (var i = 0; i < count; i++) {
                var angle = (i / count) * Math.PI * 2;
                spawnBulletsAtAngle(cx, cy, angle, speed, radius, "enemy")
            }
        }

        function spawnBulletTowardsPlayer(cx, cy, playerX, playerY, speed) {
        const angle = Math.atan2(playerX - cx, playerY - cy);
        bullets.push({
            alive: true,
            shooter: "enemy",
            x: cx, y: cy,
            vx: Math.cos(angle - Math.PI/2) * speed,
            vy: Math.sin(angle + Math.PI/2) * speed,
            radius: 6
        });
        }

        
        function loop() {
            const now = performance.now();
            const delta = now - lastTick;
            lastTick = now;

            accumulator += delta;

            while (accumulator >= MS_PER_TICK) {
                update(MS_PER_TICK / 1000); // pass deltaTime in seconds
                accumulator -= MS_PER_TICK;
            }

            requestAnimationFrame(loop);
        }
        

        function update(dt) {
            if (gameOver) {
                alert(`Game Over! Final Score: ${score}`);
                window.location.reload();
                return;
            }

            scoreEl.innerText = score;

            if (player.shotCooldown > 0) player.shotCooldown -= dt;

            for (var e of enemies) {
                for (var i; i < e.cooldowns.length; i++) {
                    var c = cooldowns[i];
                    if (c > 0) c -= dt;
                }
            }


            // // --- Add Enemies ---
            // if (tick % 1 === 0) {
            //     if (Math.random() > 0.5) {
            //         var leftSniper = sideSniper;
            //         leftSniper.x = 50;
            //         leftSniper.y = -10;
            //         enemies.push(leftSniper);
            //     }
            //     else {
            //         var rightSniper = sideSniper;
            //         rightSniper.x = 550;
            //         rightSniper.y = -10;
            //         enemies.push(rightSniper);
            //     }
            // }


            // --- Movement ---
            if (keys['ArrowUp']) player.y -= player.speed * dt;
            if (keys['ArrowDown']) player.y += player.speed * dt;
            if (keys['ArrowLeft']) player.x -= player.speed * dt;
            if (keys['ArrowRight']) player.x += player.speed * dt;

            // Clamp player to screen
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            //Player bullets
            if (keys['z'] && player.shotCooldown <= 0) {
                bullets.push({
                    alive: true,
                    shooter: "player",
                    x: player.x,
                    y: player.y,
                    vx: 0,
                    vy: -700,
                    radius: 5
                });
                player.shotCooldown = 0.1;
            }


            //Enemy AI
            for (var i = 0; i < enemies.length; i++) {
                var e = enemies[i];
                //WIP: patterns are gonna be some sort of list with a callback in each 
                for (var p of e.patterns) {

                }

                // if (e.type == "boss1") {
                //     // Pattern A: Spiral from center
                //     if (e.cooldowns[0] <= 0) {
                //         var angle = (tick * 0.05) % (Math.PI * 2);
                //         spawnBulletsAtAngle(e.x, e.y, angle, 300, 6);
                //         e.cooldowns[0] = 0.2;
                //     }
                //     // Pattern B: Burst rings
                //     if (e.cooldowns[1] <= 0) {
                //         spawnBulletRing(e.x, e.y, 16, 200, 5);
                //         e.cooldowns[1] = 0.8;
                //     }
                // }
                // else if (e.type == "sideSniper") {
                //     //Move
                //     e.y += e.speed * dt
                //     //Shoot towards player
                //     if (tick % 0.2 === 0) {
                //         spawnBulletTowardsPlayer(e.x, e.y, player.x, player.y, 5);
                //     }
                // }
                if (e.health <= 0) {
                    enemies.splice(i, 1);
                }
            }

            // --- Update & Check Bullets ---
            for (var i = 0; i < bullets.length; i++) {
                var b = bullets[i];

                b.x += b.vx * dt;
                b.y += b.vy * dt;

                if (b.shooter == "enemy") {
                    var dist = Math.hypot(b.x - player.x, b.y - player.y);
                    if (dist < b.radius + player.hitboxRadius) {
                        gameOver = true;
                        return;
                    }
                }

                if (b.shooter == "player") {
                    for (var e of enemies) {
                        var dist = Math.hypot(b.x - e.x, b.y - e.y);
                        if (dist < b.radius + e.hitboxRadius) {
                            b.alive = false;
                            e.health -= 10;
                            score += 10;
                        }
                    }
                }

                // Remove dead and off screen bullets
                if (b.x < -10 || b.x > canvas.width + 10 || b.y < -10 || b.y > canvas.height + 10 || b.alive == false) {
                    bullets.splice(i, 1);
                }
            }


            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "10px Arial";
            ctx.fillText("Delta " + dt, 10, 40);
            ctx.fillText("bullets " + bullets.length, 10, 50);
            ctx.fillText("enemies " + enemies.length, 10, 60);
            ctx.fillText("cooldoqwn " + enemies[0].cooldowns[1], 10, 70);

            // Draw Enemies
            for (var e of enemies) {
                if (e.type == "boss1") {
                    if (e.health > 0) {
                        ctx.font = "25px Arial";
                        ctx.fillText("Health: " + e.health, 10, 25);
                        //ctx.fillRect(0, 20, e.health, 20)
                    }
                    ctx.fillStyle = 'purple';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                else if (e.type == "sideSniper") {
                    ctx.fillStyle = 'purple';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw Player Ship
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw critical Hitbox core
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.hitboxRadius, 0, Math.PI * 2);
            ctx.fill();

            // Draw Bullets
            ctx.fillStyle = '#ff3336';
            for (var b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            }

        }

        requestAnimationFrame(loop);

    </script>
</body>
</html>
