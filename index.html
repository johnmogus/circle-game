<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Bullet Hell</title>
    <style>
        body { margin: 0; background: #ff0000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #fff; background: #000; }

        .wrapper {
            position: relative;
        }
        .symbol {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 500px;
            color: black;
            opacity: 1;
            pointer-events: none; /* canvas still receives clicks */
            z-index: 0;
        }
        #gameCanvas {
            position: relative;
            z-index: 1;        /* canvas sits on top */
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="symbol">CIRCLE GAME</div>
        <canvas id="gameCanvas" width="600" height="800"></canvas>
    </div>


    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const TICK_RATE = 60;
        const MS_PER_TICK = 1000 / TICK_RATE;
        let lastTick = performance.now();
        let accumulator = 0;

        // Game State
        let score = 0;
        let gamePaused = false;
        let gameOver = false;

        const attackPatterns = {
            spiral: {
                cooldown: 0,
                bulletSpeed: 300,
                shotNumber: 0,
                shotsPerCycle: 16
            },
            burstRing: {
                cooldown: 0,
                bulletSpeed: 200
            },
            towardsPlayer: {
                cooldown: 0,
                bulletSpeed: 100
            }
        }

        class ShootPattern {
            constructor(shotCooldown, bulletSpeed) {
                this.shotCooldown = shotCooldown;
                this.cooldownTimer = shotCooldown;
                this.bulletSpeed = bulletSpeed;
            }
            update(x, y, dt) {}
        }
        class SpiralShootPattern extends ShootPattern {
            constructor() {
                super(0.1, 300)
                this.shotsPerCycle = 16;
                this.shotNumber = 0;
            }
            update(x, y, dt) {
                if (this.shotNumber >= this.shotsPerCycle) this.shotNumber = 0;
                if (this.cooldownTimer > 0) this.cooldownTimer -= dt;
                else {
                    var angle = (this.shotNumber / this.shotsPerCycle)*(Math.PI * 2);
                    spawnBulletsAtAngle(e.x, e.y, angle, this.bulletSpeed, 6, "enemy");
                    this.shotNumber++;
                    this.cooldownTimer = shotCooldown;
                }
            }

        }


        class Entity {
            constructor(x, y, health) {
                this.x = x;
                this.y = y;
                this.health = health;
            }
            render() {
                return;
            }
        }
        
        class Player extends Entity {
            constructor(x, y, health, hitboxRadius, moveSpeed, damage) {
                super(x, y, health);
                this.hitboxRadius = hitboxRadius;
                this.moveSpeed = moveSpeed;
                this.damage = damage;
                this.shotCooldown = 0.1;
            }
            render() {
                //body
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 15, 0, Math.PI * 2);
                ctx.fill();
                //hitbox
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.hitboxRadius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        class Enemy extends Entity {
            constructor(x, y, health, shootPatterns) {
                super(x, y, health)
                this.attackPatterns = shootPatterns;
            }
            shootUpdate() {
                for (var p of shootPatterns) {
                    p.update(this.x, this.y);
                }
            }
        }

        class Boss1 extends Enemy {
            constructor(x, y) {
                super(
                    x, y, 
                    health=100, 
                    shootPatterns=[
                        SpiralShootPattern,
                        //burstRing
                    ]
                );
                this.hitboxRadius = 40;
                this.size = 30;
                this.color = 'purple';
            }
            render() {
                ctx.font = "25px Arial";
                ctx.fillStyle = 'white';
                ctx.textAlign = "start"; 
                ctx.fillText("Health: " + this.health, 10, 25);

                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const player = {
            x: 300, y: 700,
            speed: 400,
            size: 15,
            hitboxRadius: 4,
            damage: 10,
            shotCooldown: 0
        };

        const boss1 = {
                type: "boss1",
                x: 300, y: 200,
                speed: 5,
                size: 30,
                hitboxRadius: 40,
                health: 100,
                patterns: [
                    attackPatterns.spiral,
                    attackPatterns.burstRing
                ]
        };

        const sideSniper = {
            type: "sideSniper",
            speed: 200,
            size: 20,
            hitboxRadius: 40,
            health: 10,
            patterns: [
                attackPatterns.towardsPlayer
            ]
        };


        const enemies = [];
        enemies.push(Object.create(boss1));

        const bullets = [];

        // Input tracking
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);



        function spawnBulletsAtAngle(cx, cy, angle, speed, radius, shooter) {
            bullets.push({
                alive: true,
                shooter: shooter,
                x: cx, y: cy,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: radius
            });
        }

        // Spawn a ring of bullets
        function spawnBulletRing(cx, cy, count, speed, radius) {
            for (var i = 0; i < count; i++) {
                var angle = (i / count) * Math.PI * 2;
                spawnBulletsAtAngle(cx, cy, angle, speed, radius, "enemy")
            }
        }

        function spawnBulletTowardsPlayer(cx, cy, playerX, playerY, speed) {
            const angle = Math.atan2(playerX - cx, playerY - cy);
            bullets.push({
                alive: true,
                shooter: "enemy",
                x: cx, y: cy,
                vx: Math.cos(angle - Math.PI/2) * speed,
                vy: Math.sin(angle + Math.PI/2) * speed,
                radius: 6
            });
        }


        
        function loop() {
            const now = performance.now();
            const delta = now - lastTick;
            lastTick = now;

            accumulator += delta;

            while (accumulator >= MS_PER_TICK) {
                update(MS_PER_TICK / 1000);
                accumulator -= MS_PER_TICK;
            }

            requestAnimationFrame(loop);
        }



        let spawnguys = 0;

        function update(dt) {
            if (gamePaused) {
                ctx.fillStyle = 'red';
                ctx.textAlign = "center"; 
                ctx.font = "25px Arial";
                if (gameOver) {
                    if (keys["Enter"]) window.location.reload();
                    ctx.fillText(`Final Score: ${Math.floor(score)}`, 300, 400);
                }
                else {
                    if (keys["Enter"]) gamePaused = false;
                    ctx.fillText("Score: " + Math.floor(score), 300, 400);
                }
                return;
            }

            score += dt * 10;


            if (keys['Escape']) gamePaused = true;

            // Player Movement
            if (keys['ArrowUp']) player.y -= player.speed * dt;
            if (keys['ArrowDown']) player.y += player.speed * dt;
            if (keys['ArrowLeft']) player.x -= player.speed * dt;
            if (keys['ArrowRight']) player.x += player.speed * dt;

            // Clamp player to screen
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            // Player bullets
            if (player.shotCooldown > 0) player.shotCooldown -= dt;
            else if (keys['z']) {
                bullets.push({
                    alive: true,
                    shooter: "player",
                    x: player.x,
                    y: player.y,
                    vx: 0,
                    vy: -700,
                    radius: 10
                });
                player.shotCooldown = 0.1;
            }


            // Add Enemies
            if (spawnguys > 0) spawnguys -= dt;
            else {
                enemies.push(Object.create(sideSniper));
                enemies[enemies.length-1].x = Math.floor(Math.random() * canvas.width);;
                enemies[enemies.length-1].y = -10;
                spawnguys = 1;
            }

            //Enemy movement and shoot patterns
            for (var i = 0; i < enemies.length; i++) {
                var e = enemies[i];

                //movement
                if (e.type == "sideSniper") {
                    // var angle = Math.atan2(player.x - e.x, player.y - e.y);
                    // e.x += Math.cos(angle - Math.PI/2) * e.speed * dt;
                    // e.y += Math.sin(angle + Math.PI/2) * e.speed * dt;

                    e.y += dt * e.speed;
                }

                //patterns
                for (var p of e.patterns) {
                    if (p == attackPatterns.spiral) {
                        if (p.shotNumber >= p.shotsPerCycle) p.shotNumber = 0;

                        if (p.cooldown > 0) p.cooldown -= dt;
                        else {
                            var angle = (p.shotNumber / p.shotsPerCycle)*(Math.PI * 2);
                            spawnBulletsAtAngle(e.x, e.y, angle, p.bulletSpeed, 6, "enemy");
                            p.shotNumber++;
                            p.cooldown = 0.1;
                        }
                    }
                    if (p == attackPatterns.burstRing) {
                        if (p.cooldown > 0) p.cooldown -= dt;
                        else {
                            spawnBulletRing(e.x, e.y, 20, p.bulletSpeed, 6);
                            p.cooldown = 0.8;
                        }
                    }
                    if (p == attackPatterns.towardsPlayer) {
                        if (p.cooldown > 0) p.cooldown -= dt;
                        else {
                            spawnBulletTowardsPlayer(e.x, e.y, player.x, player.y, p.bulletSpeed);
                            p.cooldown = 1;
                        }
                    }
                }

                //kill
                if (e.y > canvas.height + e.size || e.health <= 0) {
                    if (e.type == "boss1") {
                        var newBoss = Object.create(boss1);
                        newBoss.x = Math.floor(Math.random() * canvas.width);
                        enemies.push(newBoss);
                    }
                    score += 100;
                    enemies.splice(i, 1);
                }
            }

            // --- Update & Check Bullets ---
            for (var i = 0; i < bullets.length; i++) {
                var b = bullets[i];

                //enemy bullets
                if (b.shooter == "enemy") {
                    var dist = Math.hypot(b.x - player.x, b.y - player.y);
                    if (dist < b.radius + player.hitboxRadius) {
                        gamePaused = true;
                        gameOver = true;
                        return;
                    }
                }

                //player bullets
                if (b.shooter == "player") {
                    for (var e of enemies) {
                        var dist = Math.hypot(b.x - e.x, b.y - e.y);
                        if (dist < b.radius + e.hitboxRadius) {
                            b.alive = false;
                            e.health -= player.damage;
                        }
                    }
                }

                //apply velocity
                b.x += b.vx * dt;
                b.y += b.vy * dt;

                // Remove dead and off screen bullets
                if (b.x < -10 || b.x > canvas.width + 10 || b.y < -10 || b.y > canvas.height + 10 || b.alive == false) {
                    bullets.splice(i, 1);
                }
            }


            //Draw
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; 
            ctx.fillStyle = 'white';
            ctx.font = "25px Arial"
            ctx.fillText("Score: " + Math.floor(score), 300, 25);
            // ctx.font = "10px Arial";
            // ctx.fillText("bullets " + bullets.length, 10, 50);
            // ctx.fillText("enemies " + enemies.length, 10, 60);

            
            // Draw Enemies
            for (var e of enemies) {
                if (e.type == "boss1") {
                    if (e.health > 0) {
                        ctx.font = "25px Arial";
                        ctx.fillStyle = 'white';
                        ctx.textAlign = "start"; 
                        ctx.fillText("Health: " + e.health, 10, 25);
                    }
                    ctx.fillStyle = 'purple';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                else if (e.type == "sideSniper") {
                    ctx.fillStyle = 'purple';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw Player Ship
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw critical Hitbox core
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.hitboxRadius, 0, Math.PI * 2);
            ctx.fill();

            // Draw Bullets
            ctx.fillStyle = '#ff3336';
            for (var b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            }

        }

        requestAnimationFrame(loop);

    </script>
</body>
</html>
